<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile / Scroll Exit-Intent Popup</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background:#fff7ed; color:#431407; line-height:1.6; }
  .content { max-width: 720px; margin:0 auto; padding: 60px 24px; }
  a.back { color:#ea580c; text-decoration:none; }
  .filler { height: 1400px; background: repeating-linear-gradient(180deg,#ffedd5,#ffedd5 40px,#fed7aa 40px,#fed7aa 80px);
    border-radius:12px; margin-top:24px; display:flex; align-items:flex-start; justify-content:center;
    padding-top:40px; color:#9a3412; font-weight:600; }

  /* Slide-up sheet (mobile-friendly) */
  .ei-overlay { position:fixed; inset:0; background: rgba(67,20,7,.45);
    opacity:0; visibility:hidden; transition: opacity .3s; z-index:1000; }
  .ei-overlay.show { opacity:1; visibility:visible; }
  .ei-sheet { position:fixed; left:0; right:0; bottom:0; background:#fff;
    border-radius:20px 20px 0 0; padding: 28px 24px calc(28px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 40px rgba(0,0,0,.25); transform: translateY(100%);
    transition: transform .35s cubic-bezier(.34,1.3,.64,1); text-align:center; z-index:1001;
    max-width: 520px; margin:0 auto; }
  .ei-overlay.show .ei-sheet { transform: translateY(0); }
  .ei-grip { width:42px; height:5px; background:#e7e5e4; border-radius:99px; margin:0 auto 18px; }
  .ei-sheet h2 { margin:0 0 8px; font-size:1.5rem; }
  .ei-sheet p { color:#78716c; margin:0 0 20px; }
  .ei-sheet .cta { width:100%; background:#ea580c; color:#fff; border:0; padding:16px;
    border-radius:12px; font-size:1.05rem; font-weight:600; cursor:pointer; }
  .ei-sheet .cta:hover { background:#c2410c; }
  .ei-decline { background:none; border:0; color:#a8a29e; cursor:pointer; font-size:.9rem;
    margin-top:12px; text-decoration:underline; }
</style>
</head>
<body>
  <div class="content">
    <p><a class="back" href="index.html">← Back</a></p>
    <h1>Mobile</h1>
    <p>Scroll down, then flick back up quickly. (Also fires on back button.)</p>
    <div class="filler">↓ scroll down, then flick up ↑</div>
  </div>

  <div class="ei-overlay" id="overlay">
    <div class="ei-sheet">
      <div class="ei-grip"></div>
      <h2>Wait!</h2>
      <p>Don't leave yet.</p>
      <button class="cta" id="cta">Stay</button>
      <button class="ei-decline" id="decline">Leave</button>
    </div>
  </div>

<script>
(function () {
  const overlay = document.getElementById('overlay');

  function show() { overlay.classList.add('show'); }
  function hide() { overlay.classList.remove('show'); }

  // 1) Fast upward-scroll detection.
  let lastY = window.scrollY, lastT = Date.now();
  window.addEventListener('scroll', () => {
    const y = window.scrollY, t = Date.now();
    const dy = y - lastY, dt = t - lastT || 1;
    const velocity = dy / dt; // px per ms; negative = scrolling up
    // Fast upward flick while still some way down the page.
    if (velocity < -1.2 && y < lastY && y > 150) show();
    lastY = y; lastT = t;
  }, { passive: true });

  // 2) Back-button intent trap (works on mobile + desktop).
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => {
    show();
    history.pushState(null, '', location.href); // re-trap once
  });

  // 3) Tab-hide as a fallback signal.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') show();
  });

  document.getElementById('cta').addEventListener('click', hide);
  document.getElementById('decline').addEventListener('click', hide);
  overlay.addEventListener('click', e => { if (e.target === overlay) hide(); });
})();
</script>
</body>
</html>
